spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/testdb
    redis:
      host: localhost
      port: 6379

jwt:
  secret-key: test-secret-key-for-unit-testing-must-be-at-least-256-bits
  access-token-expire-hours: 24

kafka:
  enabled: false
  topics:
    message-events: message.events.test

user-service:
  url: http://localhost:8081

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.5

logging:
  level:
    com.bigtech.chat: DEBUG
    org.springframework.security: DEBUG
