apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: bigtech/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SERVER_PORT
              value: "8000"
            # Service URLs (routing)
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: USER_SERVICE_URL
            - name: FRIEND_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: FRIEND_SERVICE_URL
            - name: CHAT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: CHAT_SERVICE_URL
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-spring-secrets
                  key: JWT_SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: api-gateway
