apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bigtech-chat-spring-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
    - host: api.bigtech-chat-spring.local
      http:
        paths:
          # API Gateway - Main entry point
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # Direct access to User Service
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          # Direct access to Friend Service
          - path: /api/friends
            pathType: Prefix
            backend:
              service:
                name: friend-service
                port:
                  number: 8003
          # Direct access to Chat Service
          - path: /api/chat-rooms
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
          - path: /api/messages
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
          # SSE endpoint
          - path: /api/sse
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
