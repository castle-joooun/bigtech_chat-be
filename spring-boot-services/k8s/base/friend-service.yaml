apiVersion: apps/v1
kind: Deployment
metadata:
  name: friend-service
  labels:
    app.kubernetes.io/name: friend-service
    app.kubernetes.io/component: friend-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: friend-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: friend-service
        app.kubernetes.io/component: friend-service
    spec:
      containers:
        - name: friend-service
          image: bigtech/friend-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SERVER_PORT
              value: "8003"
            # MySQL Database
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(MYSQL_HOST):$(MYSQL_PORT)/$(MYSQL_DATABASE)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-spring-secrets
                  key: MYSQL_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-spring-secrets
                  key: MYSQL_PASSWORD
            # Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: REDIS_PORT
            # Kafka
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            # User Service URL (inter-service communication)
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-spring-config
                  key: USER_SERVICE_URL
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-spring-secrets
                  key: JWT_SECRET_KEY
          envFrom:
            - configMapRef:
                name: bigtech-chat-spring-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8003
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: friend-service
  labels:
    app.kubernetes.io/name: friend-service
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: 8003
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: friend-service
