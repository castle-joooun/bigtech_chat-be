apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bigtech-chat-ingress
  namespace: bigtech-chat
  labels:
    app: bigtech-chat
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"

    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # SSE Support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  rules:
    - host: api.bigtech-chat.local
      http:
        paths:
          # User Service Routes
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8005
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8005
          - path: /api/profile
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8005

          # Friend Service Routes
          - path: /api/friends
            pathType: Prefix
            backend:
              service:
                name: friend-service
                port:
                  number: 8003

          # Chat Service Routes
          - path: /api/chat-rooms
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
          - path: /api/messages
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
          - path: /api/sse
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8002
