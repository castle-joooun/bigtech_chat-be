apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: bigtech-chat
  labels:
    app: chat-service
    app.kubernetes.io/name: chat-service
    app.kubernetes.io/part-of: bigtech-chat-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: chat-service
          image: bigtech-chat-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-secrets
                  key: MYSQL_URL
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-secrets
                  key: MONGO_URL
            - name: MONGODB_DB_NAME
              value: "bigtech_chat"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-secrets
                  key: REDIS_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_MESSAGE_EVENTS
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-config
                  key: KAFKA_TOPIC_MESSAGE_EVENTS
            - name: KAFKA_TOPIC_CHAT_EVENTS
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-config
                  key: KAFKA_TOPIC_CHAT_EVENTS
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bigtech-chat-config
                  key: USER_SERVICE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-secrets
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: bigtech-chat-secrets
                  key: ALGORITHM
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: bigtech-chat
  labels:
    app: chat-service
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
  selector:
    app: chat-service
